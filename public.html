<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delicias Torriet - Pedidos</title>
  <?!= include('styles'); ?>
</head>
<body>
  <div class="container">
    <div class="wizard-container">
      <!-- Progress Bar -->
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <!-- Step 1: Welcome -->
      <div class="step active" id="step1">
        <div class="welcome-step">
          <div class="welcome-logo">🥟</div>
          <h1 class="welcome-title">Delicias Torriet</h1>
          <p class="welcome-subtitle">Empanadas artesanales con sabor tropical</p>
          <button class="btn btn-primary" onclick="nextStep()">Comenzar Pedido</button>
        </div>
      </div>

      <!-- Step 2: Products -->
      <div class="step" id="step2">
        <h2 class="summary-title" style="text-align: center; margin-bottom: 20px;">Selecciona tus Empanadas</h2>
        <div class="products-grid" id="productsGrid">
          <!-- Products rendered by JS -->
        </div>
        <button class="btn btn-primary" onclick="nextStep()">Continuar</button>
        <button class="btn btn-secondary" onclick="prevStep()">Atrás</button>
      </div>

      <!-- Step 3: Summary -->
      <div class="step" id="step3">
        <h2 class="summary-title" style="text-align: center; margin-bottom: 20px;">Resumen del Pedido</h2>
        <div class="summary-card">
          <div id="summaryList">
            <!-- Summary items rendered by JS -->
          </div>
        </div>
        <div class="summary-total">
          <p class="total-label">Total a pagar</p>
          <p class="total-amount" id="totalAmount">$0.00</p>
        </div>
        <button class="btn btn-primary" onclick="nextStep()" style="margin-top: 20px;">Continuar</button>
        <button class="btn btn-secondary" onclick="prevStep()">Atrás</button>
      </div>

      <!-- Step 4: Form -->
      <div class="step" id="step4">
        <h2 class="summary-title" style="text-align: center; margin-bottom: 20px;">Tus Datos</h2>
        <div class="form-group">
          <label class="form-label">Nombre completo *</label>
          <input type="text" class="form-input" id="nombre" required>
        </div>
        <div class="form-group">
          <label class="form-label">Teléfono/WhatsApp *</label>
          <input type="tel" class="form-input" id="telefono" required>
        </div>
        <div class="form-group">
          <label class="form-label">Tipo de entrega *</label>
          <div class="toggle-group">
            <div class="toggle-option">
              <input type="radio" id="recoger" name="tipoEntrega" value="Recoger" checked onchange="toggleDireccion()">
              <label class="toggle-label" for="recoger">🏪 Recoger</label>
            </div>
            <div class="toggle-option">
              <input type="radio" id="delivery" name="tipoEntrega" value="Delivery" onchange="toggleDireccion()">
              <label class="toggle-label" for="delivery">🚗 Delivery</label>
            </div>
          </div>
        </div>
        <div class="form-group" id="direccionGroup" style="display: none;">
          <label class="form-label">Dirección de entrega</label>
          <input type="text" class="form-input" id="direccion">
        </div>
        <div class="form-group">
          <label class="form-label">Fecha y hora deseada</label>
          <input type="datetime-local" class="form-input" id="fechaEntrega">
        </div>
        <div class="form-group">
          <label class="form-label">Notas adicionales</label>
          <input type="text" class="form-input" id="notas" placeholder="Ej: Sin cebolla, bien doradas...">
        </div>
        <button class="btn btn-primary" onclick="nextStep()">Continuar</button>
        <button class="btn btn-secondary" onclick="prevStep()">Atrás</button>
      </div>

      <!-- Step 5: Payment -->
      <div class="step" id="step5">
        <h2 class="summary-title" style="text-align: center; margin-bottom: 20px;">Método de Pago</h2>
        <div class="payment-card">
          <div class="payment-icon">💳</div>
          <p class="payment-label">Paga via Yappy al número:</p>
          <p class="payment-number">6641-8825</p>
        </div>
        <div class="form-group">
          <label class="form-label">Referencia de pago *</label>
          <input type="text" class="form-input" id="referencia" placeholder="Últimos 4 dígitos o referencia">
        </div>
        <button class="btn btn-primary" onclick="confirmarPedido()">Confirmar Pedido</button>
        <button class="btn btn-secondary" onclick="prevStep()">Atrás</button>
      </div>

      <!-- Step 6: Confirmation -->
      <div class="step" id="step6">
        <div class="confirmation-step">
          <div class="success-icon">✅</div>
          <h2 class="confirmation-title">¡Pedido Confirmado!</h2>
          <p style="color: #6C757D; margin-bottom: 20px;">Tu pedido ha sido recibido exitosamente</p>
          <div class="order-id-display" id="orderIdDisplay"></div>
          <p style="margin-top: 20px; color: #6C757D;">Total del pedido: <span id="finalTotal" style="font-weight: 700; color: #FF6B35;">$0.00</span></p>
          <button class="btn btn-primary" onclick="hacerOtroPedido()" style="margin-top: 30px;">Hacer otro pedido</button>
        </div>
      </div>
    </div>
  </div>

  <?!= include('script'); ?>
</body>
</html>
