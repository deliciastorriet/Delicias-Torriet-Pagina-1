<style>
/* Delicias Torriet - Premium Design */
:root {
  --turquesa: #2DD4BF;
  --turquesa-dark: #0D9488;
  --turquesa-deep: #0F766E;
  --celeste: #38BDF8;
  --celeste-light: #E0F2FE;
  --naranja: #FB923C;
  --naranja-dark: #EA580C;
  --blanco: #FFFFFF;
  --gris-claro: #F1F5F9;
  --gris-medio: #64748B;
  --gris-oscuro: #1E293B;
  --sombra: rgba(15, 23, 42, 0.08);
  --sombra-suave: rgba(45, 212, 191, 0.15);
  --sombra-media: rgba(15, 23, 42, 0.12);
  --glass: rgba(255, 255, 255, 0.7);
  --glass-border: rgba(255, 255, 255, 0.5);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: linear-gradient(160deg, #F0FDFA 0%, #E0F2FE 40%, #F0F9FF 100%);
  color: var(--gris-oscuro);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 480px;
  margin: 0 auto;
  padding: 24px 16px;
}

/* Wizard Container */
.wizard-container {
  background: var(--blanco);
  border-radius: 28px;
  box-shadow: 0 1px 3px var(--sombra), 0 20px 60px var(--sombra-media);
  overflow: hidden;
  min-height: 580px;
  position: relative;
  border: 1px solid rgba(255, 255, 255, 0.8);
}

/* Progress Bar */
.progress-bar {
  background: var(--gris-claro);
  height: 3px;
  position: relative;
}

.progress-fill {
  background: linear-gradient(90deg, var(--turquesa), var(--celeste));
  height: 100%;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  border-radius: 2px;
}

/* Step Indicators */
.step-indicators {
  display: flex;
  justify-content: center;
  gap: 8px;
  padding: 16px 0 0;
}

.step-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--gris-claro);
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.step-dot.active {
  width: 24px;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--turquesa), var(--celeste));
}

.step-dot.completed {
  background: var(--turquesa);
}

/* Steps - Slide Transition System */
.step {
  display: none;
  padding: 36px 28px;
}

.step.active {
  display: block;
  animation: slideInRight 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}

.step.exiting {
  display: block;
  animation: slideOutLeft 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.step.exiting-back {
  display: block;
  animation: slideOutRight 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

.step.entering-back {
  display: block;
  animation: slideInLeft 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(40px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes slideOutLeft {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(-40px); }
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-40px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes slideOutRight {
  from { opacity: 1; transform: translateX(0); }
  to { opacity: 0; transform: translateX(40px); }
}

/* Step 1 - Welcome */
.welcome-step {
  text-align: center;
  padding: 50px 20px 40px;
}

.welcome-logo {
  font-size: 3.5rem;
  margin-bottom: 16px;
  filter: drop-shadow(0 4px 12px var(--sombra-suave));
  animation: floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.welcome-title {
  font-size: 1.75rem;
  font-weight: 800;
  color: var(--turquesa-deep);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.welcome-subtitle {
  font-size: 1rem;
  color: var(--gris-medio);
  margin-bottom: 36px;
  font-weight: 400;
}

/* Step 2 - Products */
.products-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.product-card {
  background: var(--blanco);
  border-radius: 18px;
  overflow: hidden;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
  border: 2px solid var(--gris-claro);
  box-shadow: 0 1px 3px var(--sombra);
}

.product-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px var(--sombra-media);
  border-color: var(--celeste-light);
}

.product-card.selected {
  border-color: var(--turquesa);
  box-shadow: 0 8px 24px var(--sombra-suave);
}

.product-card.selected .product-info {
  background: linear-gradient(135deg, var(--turquesa) 0%, var(--celeste) 100%);
}

.product-card.selected .product-name,
.product-card.selected .product-price {
  color: var(--blanco);
}

.product-card.selected .qty-btn {
  background: rgba(255, 255, 255, 0.3);
}

.product-card.selected .qty-btn:hover {
  background: rgba(255, 255, 255, 0.5);
}

.product-image {
  height: 110px;
  background-size: cover;
  background-position: center;
  display: flex;
  align-items: center;
  justify-content: center;
}

.product-info {
  padding: 14px 12px;
  text-align: center;
  transition: all 0.35s ease;
}

.product-name {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--gris-oscuro);
  margin-bottom: 4px;
}

.product-price {
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--naranja-dark);
}

.product-quantity {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
}

.qty-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  border: none;
  background: var(--gris-claro);
  color: var(--turquesa-deep);
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
}

.qty-btn:hover {
  background: var(--turquesa);
  color: var(--blanco);
  transform: scale(1.12);
}

.qty-btn:active {
  transform: scale(0.95);
}

.qty-display {
  font-size: 1.1rem;
  font-weight: 800;
  min-width: 28px;
  text-align: center;
}

/* Step 3 - Summary */
.summary-card {
  background: var(--gris-claro);
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 20px;
}

.summary-title {
  font-size: 1.15rem;
  font-weight: 800;
  color: var(--turquesa-deep);
  margin-bottom: 16px;
  letter-spacing: -0.3px;
}

.summary-item {
  display: flex;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid rgba(148, 163, 184, 0.15);
  font-weight: 500;
}

.summary-item:last-child {
  border-bottom: none;
}

.summary-total {
  background: linear-gradient(135deg, var(--turquesa-deep) 0%, var(--turquesa) 50%, var(--celeste) 100%);
  color: var(--blanco);
  padding: 24px;
  border-radius: 18px;
  text-align: center;
  margin-top: 20px;
  box-shadow: 0 8px 24px var(--sombra-suave);
}

.total-label {
  font-size: 0.9rem;
  opacity: 0.85;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}

.total-amount {
  font-size: 2.25rem;
  font-weight: 800;
  margin-top: 4px;
  letter-spacing: -1px;
}

/* Step 4 - Form */
.form-group {
  margin-bottom: 18px;
}

.form-label {
  display: block;
  font-size: 0.85rem;
  font-weight: 700;
  color: var(--gris-medio);
  margin-bottom: 7px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.form-input {
  width: 100%;
  padding: 14px 16px;
  border: 2px solid var(--gris-claro);
  border-radius: 14px;
  font-size: 1rem;
  transition: all 0.3s ease;
  background: var(--gris-claro);
  font-family: inherit;
}

.form-input:focus {
  outline: none;
  border-color: var(--turquesa);
  background: var(--blanco);
  box-shadow: 0 0 0 4px var(--sombra-suave);
}

.form-input::placeholder {
  color: #CBD5E1;
}

.toggle-group {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
}

.toggle-option {
  flex: 1;
}

.toggle-option input[type="radio"] {
  display: none;
}

.toggle-label {
  display: block;
  padding: 14px;
  border: 2px solid var(--gris-claro);
  border-radius: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  font-weight: 700;
  color: var(--gris-medio);
  font-size: 0.95rem;
}

.toggle-option input[type="radio"]:checked + .toggle-label {
  border-color: var(--turquesa);
  background: linear-gradient(135deg, var(--turquesa), var(--celeste));
  color: var(--blanco);
  box-shadow: 0 4px 12px var(--sombra-suave);
}

/* Step 5 - Payment */
.payment-card {
  background: linear-gradient(135deg, var(--turquesa-deep) 0%, var(--turquesa) 50%, var(--celeste) 100%);
  color: var(--blanco);
  padding: 32px 24px;
  border-radius: 20px;
  text-align: center;
  margin-bottom: 20px;
  box-shadow: 0 8px 28px var(--sombra-suave);
}

.payment-icon {
  font-size: 2.5rem;
  margin-bottom: 12px;
}

.payment-number {
  font-size: 1.75rem;
  font-weight: 800;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.payment-label {
  font-size: 0.9rem;
  opacity: 0.85;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}

/* Buttons */
.btn {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 14px;
  font-size: 0.95rem;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-family: inherit;
}

.btn-primary {
  background: linear-gradient(135deg, var(--turquesa) 0%, var(--celeste) 100%);
  color: var(--blanco);
  box-shadow: 0 4px 14px var(--sombra-suave);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px var(--sombra-suave);
}

.btn-primary:active {
  transform: translateY(0);
}

.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

.btn-secondary {
  background: transparent;
  color: var(--gris-medio);
  margin-top: 10px;
  border: 2px solid var(--gris-claro);
}

.btn-secondary:hover {
  background: var(--gris-claro);
  color: var(--gris-oscuro);
  border-color: var(--gris-medio);
}

/* Step 6 - Confirmation */
.confirmation-step {
  text-align: center;
  padding: 50px 20px 40px;
}

.success-icon {
  font-size: 4rem;
  margin-bottom: 16px;
  animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  100% { transform: scale(1); opacity: 1; }
}

.confirmation-title {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--turquesa-deep);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}

.order-id-display {
  font-size: 1.75rem;
  font-weight: 800;
  color: var(--naranja-dark);
  margin: 20px 0;
  padding: 20px;
  background: var(--gris-claro);
  border-radius: 16px;
  letter-spacing: 2px;
}

/* Responsive */
@media (max-width: 480px) {
  .container {
    padding: 12px 10px;
  }

  .wizard-container {
    border-radius: 20px;
    min-height: 500px;
  }

  .products-grid {
    grid-template-columns: 1fr;
  }

  .product-image {
    height: 140px;
  }

  .step {
    padding: 28px 20px;
  }

  .welcome-logo {
    font-size: 3rem;
  }

  .welcome-title {
    font-size: 1.5rem;
  }

  .total-amount {
    font-size: 2rem;
  }
}
</style>
