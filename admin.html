<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delicias Torriet - Panel Admin</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --turquesa: #248176;
      --turquesa-dark: #1a6157;
      --turquesa-deep: #163f38;
      --turquesa-glow: #3ba294;
      --dorado: #eb8a13;
      --dorado-dark: #d4760a;
      --dorado-light: #f5a942;
      --gris-claro: #F1F5F9;
      --gris-medio: #64748B;
      --gris-oscuro: #1E293B;
      --glass-bg: rgba(255, 255, 255, 0.72);
      --glass-border: rgba(255, 255, 255, 0.9);
      --glass-blur: 24px;
      --glass-shadow: 0 8px 32px rgba(36, 129, 118, 0.1);
      --sombra-suave: 0 2px 12px rgba(36, 129, 118, 0.08);
      --sombra-media: 0 8px 30px rgba(36, 129, 118, 0.12);
      --sombra-fuerte: 0 12px 40px rgba(36, 129, 118, 0.18);
      --radio: 16px;
      --radio-sm: 10px;
      --transicion: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: linear-gradient(160deg, #e8f5f3 0%, #d4f0ed 30%, #b8e6df 60%, #9dd8cd 100%);
      color: var(--gris-oscuro);
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body::before, body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      z-index: 0;
      pointer-events: none;
    }
    body::before {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(36,129,118,0.15), transparent 70%);
      top: -120px; right: -120px;
      animation: blobFloat1 22s ease-in-out infinite;
    }
    body::after {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(235,138,19,0.1), transparent 70%);
      bottom: -100px; left: -100px;
      animation: blobFloat2 28s ease-in-out infinite;
    }
    @keyframes blobFloat1 {
      0%, 100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(-60px, 40px) scale(1.1); }
      66% { transform: translate(30px, -30px) scale(0.95); }
    }
    @keyframes blobFloat2 {
      0%, 100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(50px, -40px) scale(1.15); }
      66% { transform: translate(-40px, 20px) scale(0.9); }
    }

    /* HEADER */
    .admin-header {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-bottom: 1px solid var(--glass-border);
      padding: 18px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--sombra-suave);
    }
    .admin-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--turquesa), var(--turquesa-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .admin-header .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* BUTTONS */
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: var(--radio-sm);
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transicion);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -0.2px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--dorado), var(--dorado-dark));
      color: #fff;
      box-shadow: 0 4px 14px rgba(235,138,19,0.3);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.8);
      color: var(--turquesa-dark);
      border: 1px solid rgba(36,129,118,0.15);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: var(--sombra-media);
    }
    .btn:active { transform: translateY(0); }

    /* LAYOUT */
    .admin-container {
      display: flex;
      min-height: calc(100vh - 72px);
      position: relative;
      z-index: 1;
    }

    /* SIDEBAR */
    .filters-sidebar {
      width: 280px;
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      padding: 28px 24px;
      border-right: 1px solid var(--glass-border);
      position: sticky;
      top: 72px;
      height: calc(100vh - 72px);
      overflow-y: auto;
    }
    .filter-section { margin-bottom: 28px; }
    .filter-section h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      color: var(--gris-medio);
      margin-bottom: 14px;
      font-weight: 600;
    }
    .filter-group { margin-bottom: 12px; }
    .filter-group input,
    .filter-group select {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid rgba(36,129,118,0.12);
      border-radius: var(--radio-sm);
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      background: rgba(255,255,255,0.6);
      transition: all var(--transicion);
      color: var(--gris-oscuro);
    }
    .filter-group input:focus,
    .filter-group select:focus {
      outline: none;
      border-color: var(--turquesa);
      box-shadow: 0 0 0 3px rgba(36,129,118,0.1);
      background: #fff;
    }

    /* MAIN */
    .orders-main { flex: 1; padding: 32px; }
    .orders-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .orders-header h2 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.8px;
      color: var(--turquesa-deep);
    }
    .orders-count {
      background: linear-gradient(135deg, var(--turquesa), var(--turquesa-glow));
      color: #fff;
      padding: 6px 18px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(36,129,118,0.25);
    }

    /* ORDER CARDS */
    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .order-card {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: var(--radio);
      box-shadow: var(--sombra-suave);
      overflow: hidden;
      transition: all var(--transicion);
    }
    .order-card:hover {
      box-shadow: var(--sombra-media);
      transform: translateY(-1px);
    }
    .order-header {
      padding: 20px 24px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 14px;
      align-items: center;
      border-bottom: 1px solid rgba(36,129,118,0.08);
      cursor: pointer;
    }
    .order-header-item { display: flex; flex-direction: column; }
    .order-header-item label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--gris-medio);
      margin-bottom: 3px;
      font-weight: 500;
    }
    .order-header-item span { font-weight: 600; font-size: 0.92rem; color: var(--gris-oscuro); }
    .order-id {
      font-size: 1.05rem;
      color: var(--turquesa-dark);
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    /* STATUS BADGES */
    .status-badge {
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 0.78rem;
      font-weight: 600;
      display: inline-block;
      letter-spacing: 0.2px;
    }
    .status-pago-pendiente { background: rgba(235,138,19,0.12); color: var(--dorado-dark); }
    .status-pago-pagado { background: rgba(36,129,118,0.12); color: var(--turquesa-dark); }
    .status-pedido-recibido { background: rgba(59,162,148,0.12); color: var(--turquesa-glow); }
    .status-pedido-enproceso { background: rgba(245,169,66,0.15); color: var(--dorado-dark); }
    .status-pedido-listo { background: rgba(36,129,118,0.15); color: var(--turquesa-dark); }
    .status-pedido-entregado { background: rgba(100,116,139,0.12); color: var(--gris-medio); }

    /* ORDER BODY */
    .order-body { padding: 0 24px; max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.4s ease; }
    .order-body.expanded { max-height: 800px; padding: 20px 24px; }

    .products-list {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(36,129,118,0.08);
    }
    .products-list h4 {
      color: var(--turquesa-dark);
      margin-bottom: 12px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }
    .product-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(36,129,118,0.05);
      font-size: 0.9rem;
    }
    .product-item:last-child { border-bottom: none; }

    .order-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 20px;
    }
    .detail-item label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--gris-medio);
      margin-bottom: 3px;
      display: block;
      font-weight: 500;
    }
    .detail-item span { font-weight: 500; font-size: 0.9rem; }

    .order-controls {
      background: rgba(36,129,118,0.04);
      padding: 20px;
      border-radius: var(--radio-sm);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      align-items: end;
    }
    .control-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      font-weight: 600;
      color: var(--turquesa-dark);
    }
    .control-group select {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid rgba(36,129,118,0.12);
      border-radius: var(--radio-sm);
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      background: rgba(255,255,255,0.7);
      transition: all var(--transicion);
      color: var(--gris-oscuro);
    }
    .control-group select:focus {
      outline: none;
      border-color: var(--turquesa);
      box-shadow: 0 0 0 3px rgba(36,129,118,0.1);
      background: #fff;
    }

    .btn-save {
      background: linear-gradient(135deg, var(--turquesa), var(--turquesa-glow));
      color: #fff;
      width: 100%;
      box-shadow: 0 4px 14px rgba(36,129,118,0.25);
    }
    .btn-whatsapp {
      background: linear-gradient(135deg, #25D366, #1da851);
      color: #fff;
      box-shadow: 0 4px 14px rgba(37,211,102,0.25);
    }

    .expand-btn {
      background: rgba(36,129,118,0.06);
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--turquesa-dark);
      transition: all var(--transicion);
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .expand-btn.rotated { transform: rotate(180deg); background: rgba(36,129,118,0.12); }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--gris-medio);
    }
    .empty-state h3 { font-size: 1.4rem; margin-bottom: 10px; font-weight: 600; color: var(--gris-oscuro); }

    .loading {
      text-align: center;
      padding: 60px;
      color: var(--gris-medio);
      font-size: 0.95rem;
    }
    .loading::after {
      content: '';
      display: block;
      width: 32px;
      height: 32px;
      margin: 16px auto 0;
      border: 3px solid rgba(36,129,118,0.15);
      border-top-color: var(--turquesa);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 14px 24px;
      border-radius: var(--radio-sm);
      color: #fff;
      font-weight: 600;
      font-size: 0.88rem;
      z-index: 9999;
      opacity: 0;
      transform: translateY(10px);
      transition: all var(--transicion);
      box-shadow: var(--sombra-media);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: linear-gradient(135deg, var(--turquesa), var(--turquesa-glow)); }
    .toast.error { background: linear-gradient(135deg, #e53935, #c62828); }

    @media (max-width: 1024px) {
      .admin-container { flex-direction: column; }
      .filters-sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid var(--glass-border);
      }
      .order-header { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 768px) {
      .admin-header { flex-direction: column; text-align: center; }
      .order-header { grid-template-columns: 1fr; }
      .order-controls { grid-template-columns: 1fr; }
      .orders-main { padding: 20px 16px; }
    }
  </style>
</head>
<body>
  <header class="admin-header">
    <h1>Panel Delicias Torriet</h1>
    <div class="user-info">
      <a href="https://docs.google.com/spreadsheets/d/1u8R2W6YT6xlB0hWaytk-xARCOOCjg0M4lSqlRpGbSRc/edit" target="_blank" class="btn btn-secondary">Ver Sheet</a>
      <a href="https://deliciastorriet.github.io/Delicias-Torriet-Pagina-1/" target="_blank" class="btn btn-primary">Vista publica</a>
      <button class="btn btn-secondary" onclick="cargarPedidos()">Recargar</button>
    </div>
  </header>

  <div class="admin-container">
    <aside class="filters-sidebar">
      <div class="filter-section">
        <h3>Buscar</h3>
        <div class="filter-group">
          <input type="text" id="searchInput" placeholder="Nombre, telefono o ID pedido" oninput="aplicarFiltros()">
        </div>
      </div>

      <div class="filter-section">
        <h3>Estado del Pago</h3>
        <div class="filter-group">
          <select id="filtroPago" onchange="aplicarFiltros()">
            <option value="todos">Todos</option>
            <option value="pendiente">Pendiente</option>
            <option value="pagado">Pagado</option>
          </select>
        </div>
      </div>

      <div class="filter-section">
        <h3>Estado del Pedido</h3>
        <div class="filter-group">
          <select id="filtroPedido" onchange="aplicarFiltros()">
            <option value="todos">Todos</option>
            <option value="recibido">Recibido</option>
            <option value="en proceso">En proceso</option>
            <option value="listo">Listo</option>
            <option value="entregado">Entregado</option>
          </select>
        </div>
      </div>

      <div class="filter-section">
        <h3>Ordenar por</h3>
        <div class="filter-group">
          <select id="orden" onchange="aplicarFiltros()">
            <option value="recientes">Mas recientes</option>
            <option value="antiguos">Mas antiguos</option>
            <option value="pendientes">Pendientes primero</option>
            <option value="listos">Listos primero</option>
          </select>
        </div>
      </div>
    </aside>

    <main class="orders-main">
      <div class="orders-header">
        <h2>Pedidos</h2>
        <span class="orders-count" id="ordersCount">0 pedidos</span>
      </div>
      <div id="ordersList" class="orders-list">
        <div class="loading">Cargando pedidos...</div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyIgTs0JwySUn5Co7KjQfcSrrit18r5S4jyxZ7XG3wmb35j9uw0B1VHzrCnUkPQ7ZaT/exec';
    var allPedidos = [];
    var filteredPedidos = [];

    window.onload = function() {
      cargarPedidos();
    };

    function cargarPedidos() {
      document.getElementById('ordersList').innerHTML = '<div class="loading">Cargando pedidos...</div>';
      jsonpRequest(APPS_SCRIPT_URL + '?action=getPedidos', function(data) {
        if (data && data.success) {
          allPedidos = data.pedidos || [];
          filteredPedidos = allPedidos.slice();
          document.getElementById('ordersCount').textContent = filteredPedidos.length + ' pedidos';
          renderFilteredPedidos();
        } else {
          showError(data && data.error ? data.error : 'Error desconocido');
        }
      }, function(errMsg) {
        showError(errMsg);
      });
    }

    function jsonpRequest(url, onSuccess, onError) {
      var callbackName = 'jsonp_cb_' + Date.now() + '_' + Math.floor(Math.random() * 10000);
      var script = document.createElement('script');
      script.src = url + '&callback=' + callbackName;
      script.type = 'text/javascript';
      var timeout = setTimeout(function() {
        cleanup();
        if (onError) onError('Tiempo de espera agotado');
      }, 15000);
      function cleanup() {
        clearTimeout(timeout);
        delete window[callbackName];
        if (script.parentNode) script.parentNode.removeChild(script);
      }
      window[callbackName] = function(data) {
        cleanup();
        onSuccess(data);
      };
      script.onerror = function() {
        cleanup();
        if (onError) onError('Error de red al cargar pedidos');
      };
      document.head.appendChild(script);
    }

    function showError(msg) {
      document.getElementById('ordersList').innerHTML =
        '<div class="empty-state">' +
        '<h3>Error al cargar pedidos</h3>' +
        '<p>' + msg + '</p>' +
        '<button class="btn btn-primary" onclick="cargarPedidos()" style="margin-top:20px;">Reintentar</button>' +
        '</div>';
    }

    function renderFilteredPedidos() {
      var container = document.getElementById('ordersList');

      if (filteredPedidos.length === 0) {
        container.innerHTML =
          '<div class="empty-state">' +
          '<h3>No hay pedidos</h3>' +
          '<p>No se encontraron pedidos con los filtros actuales</p>' +
          '</div>';
        return;
      }

      container.innerHTML = filteredPedidos.map(function(pedido) {
        var pagoClass = (pedido.estadoPago || '').toLowerCase().replace(/ /g, '-');
        var pedidoClass = (pedido.estadoPedido || '').toLowerCase().replace(/ /g, '-');

        return '<div class="order-card" data-id="' + pedido.idPedido + '">' +
          '<div class="order-header">' +
            '<button class="expand-btn" onclick="toggleOrder(\'' + pedido.idPedido + '\')">&#9660;</button>' +
            '<div class="order-header-item"><label>ID Pedido</label><span class="order-id">' + pedido.idPedido + '</span></div>' +
            '<div class="order-header-item"><label>Fecha</label><span>' + formatDate(pedido.fecha) + '</span></div>' +
            '<div class="order-header-item"><label>Cliente</label><span>' + esc(pedido.nombre) + '</span></div>' +
            '<div class="order-header-item"><label>Telefono</label><span>' + esc(pedido.telefono) + '</span></div>' +
            '<div class="order-header-item"><label>Entrega</label><span>' + esc(pedido.tipoEntrega) + '</span></div>' +
            '<div class="order-header-item"><label>Pago</label><span class="status-badge status-pago-' + pagoClass + '">' + esc(pedido.estadoPago) + '</span></div>' +
            '<div class="order-header-item"><label>Estado</label><span class="status-badge status-pedido-' + pedidoClass + '">' + esc(pedido.estadoPedido) + '</span></div>' +
            '<div class="order-header-item"><label>Total</label><span>$' + (pedido.total || 0).toFixed(2) + '</span></div>' +
          '</div>' +
          '<div class="order-body" id="body-' + pedido.idPedido + '">' +
            '<div class="products-list">' +
              '<h4>Productos</h4>' +
              pedido.productos.map(function(prod) {
                return '<div class="product-item">' +
                  '<span>' + esc(prod.producto) + ' x' + prod.cantidad + (prod.nota ? ' <em>(' + esc(prod.nota) + ')</em>' : '') + '</span>' +
                  '<span>$' + (prod.subtotal || 0).toFixed(2) + '</span>' +
                '</div>';
              }).join('') +
            '</div>' +
            '<div class="order-details">' +
              '<div class="detail-item"><label>Direccion</label><span>' + esc(pedido.direccion || 'N/A') + '</span></div>' +
              '<div class="detail-item"><label>Fecha entrega</label><span>' + esc(pedido.fechaEntrega || 'N/A') + '</span></div>' +
              '<div class="detail-item"><label>Notas</label><span>' + esc(pedido.notas || 'N/A') + '</span></div>' +
              '<div class="detail-item"><label>Comprobante</label><span>' + (pedido.comprobante ? '<a href="' + esc(pedido.comprobante) + '" target="_blank">Ver comprobante</a>' : 'N/A') + '</span></div>' +
            '</div>' +
            '<div class="order-controls">' +
              '<div class="control-group">' +
                '<label>Estado del Pago</label>' +
                '<select id="pago-' + pedido.idPedido + '">' +
                  '<option value="Pendiente"' + (pedido.estadoPago === 'Pendiente' ? ' selected' : '') + '>Pendiente</option>' +
                  '<option value="Pagado"' + (pedido.estadoPago === 'Pagado' ? ' selected' : '') + '>Pagado</option>' +
                '</select>' +
              '</div>' +
              '<div class="control-group">' +
                '<label>Estado del Pedido</label>' +
                '<select id="pedido-' + pedido.idPedido + '">' +
                  '<option value="Recibido"' + (pedido.estadoPedido === 'Recibido' ? ' selected' : '') + '>Recibido</option>' +
                  '<option value="En proceso"' + (pedido.estadoPedido === 'En proceso' ? ' selected' : '') + '>En proceso</option>' +
                  '<option value="Listo"' + (pedido.estadoPedido === 'Listo' ? ' selected' : '') + '>Listo</option>' +
                  '<option value="Entregado"' + (pedido.estadoPedido === 'Entregado' ? ' selected' : '') + '>Entregado</option>' +
                '</select>' +
              '</div>' +
              '<button class="btn btn-whatsapp" onclick="contactarWhatsApp(\'' + pedido.telefono + '\', \'' + pedido.idPedido + '\')">WhatsApp</button>' +
              '<button class="btn btn-save" onclick="guardarCambios(\'' + pedido.idPedido + '\')">Guardar cambios</button>' +
            '</div>' +
          '</div>' +
        '</div>';
      }).join('');
    }

    function toggleOrder(id) {
      var body = document.getElementById('body-' + id);
      var btn = document.querySelector('[data-id="' + id + '"] .expand-btn');
      body.classList.toggle('expanded');
      btn.classList.toggle('rotated');
    }

    function aplicarFiltros() {
      var search = document.getElementById('searchInput').value.toLowerCase();
      var filtroPago = document.getElementById('filtroPago').value;
      var filtroPedido = document.getElementById('filtroPedido').value;
      var orden = document.getElementById('orden').value;

      filteredPedidos = allPedidos.filter(function(pedido) {
        var matchSearch = !search ||
          (pedido.nombre || '').toLowerCase().includes(search) ||
          (pedido.telefono || '').includes(search) ||
          (pedido.idPedido || '').toLowerCase().includes(search);

        var matchPago = filtroPago === 'todos' ||
          (pedido.estadoPago || '').toLowerCase() === filtroPago;

        var matchPedido = filtroPedido === 'todos' ||
          (pedido.estadoPedido || '').toLowerCase() === filtroPedido;

        return matchSearch && matchPago && matchPedido;
      });

      filteredPedidos.sort(function(a, b) {
        switch (orden) {
          case 'recientes': return new Date(b.fecha) - new Date(a.fecha);
          case 'antiguos': return new Date(a.fecha) - new Date(b.fecha);
          case 'pendientes': return (a.estadoPago === 'Pendiente' ? -1 : 1) - (b.estadoPago === 'Pendiente' ? -1 : 1);
          case 'listos': return (a.estadoPedido === 'Listo' ? -1 : 1) - (b.estadoPedido === 'Listo' ? -1 : 1);
          default: return 0;
        }
      });

      document.getElementById('ordersCount').textContent = filteredPedidos.length + ' pedidos';
      renderFilteredPedidos();
    }

    function guardarCambios(idPedido) {
      var estadoPago = document.getElementById('pago-' + idPedido).value;
      var estadoPedido = document.getElementById('pedido-' + idPedido).value;

      var body = JSON.stringify({
        action: 'actualizarEstado',
        idPedido: idPedido,
        estadoPago: estadoPago,
        estadoPedido: estadoPedido
      });

      fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: body
      })
        .then(function() {
          showToast('Cambios guardados', 'success');
          setTimeout(cargarPedidos, 1500);
        })
        .catch(function(err) {
          showToast('Error: ' + err.toString(), 'error');
        });
    }

    function contactarWhatsApp(telefono, idPedido) {
      var mensaje = 'Hola, tu pedido ' + idPedido + ' de Delicias Torriet tiene una actualizacion.';
      var url = 'https://wa.me/' + telefono + '?text=' + encodeURIComponent(mensaje);
      window.open(url, '_blank');
    }

    function showToast(msg, type) {
      var toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.className = 'toast ' + type + ' show';
      setTimeout(function() {
        toast.className = 'toast ' + type;
      }, 3000);
    }

    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      var date = new Date(dateString);
      return date.toLocaleDateString('es-PA', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
