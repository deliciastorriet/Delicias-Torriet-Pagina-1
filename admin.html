<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delicias Torriet - Panel Admin</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #2E7D32;
      --secondary: #FF6F00;
      --accent: #00BCD4;
      --light: #FFF9E6;
      --dark: #1B5E20;
      --text: #333;
      --white: #fff;
      --gray: #f5f5f5;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--gray);
      color: var(--text);
      line-height: 1.6;
    }

    /* Header */
    .admin-header {
      background: linear-gradient(135deg, var(--primary), var(--dark));
      color: var(--white);
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .admin-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .admin-header .user-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .admin-header .email {
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--secondary);
      color: var(--white);
    }

    .btn-secondary {
      background: var(--white);
      color: var(--primary);
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }

    /* Main Layout */
    .admin-container {
      display: flex;
      min-height: calc(100vh - 80px);
    }

    /* Sidebar Filters */
    .filters-sidebar {
      width: 300px;
      background: var(--white);
      padding: 25px;
      border-right: 1px solid #ddd;
      position: sticky;
      top: 0;
      height: calc(100vh - 80px);
      overflow-y: auto;
    }

    .filter-section {
      margin-bottom: 25px;
    }

    .filter-section h3 {
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 12px;
      font-weight: 600;
    }

    .filter-group {
      margin-bottom: 15px;
    }

    .filter-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 0.9rem;
      color: #666;
    }

    .filter-group input,
    .filter-group select {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-apply {
      width: 100%;
      background: var(--primary);
      color: var(--white);
      margin-top: 10px;
    }

    /* Orders List */
    .orders-main {
      flex: 1;
      padding: 25px;
    }

    .orders-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      flex-wrap: wrap;
      gap: 15px;
    }

    .orders-header h2 {
      font-size: 1.8rem;
      color: var(--primary);
    }

    .orders-count {
      background: var(--accent);
      color: var(--white);
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
      font-weight: 600;
    }

    /* Order Cards */
    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .order-card {
      background: var(--white);
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    .order-header {
      background: linear-gradient(135deg, var(--light), var(--white));
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      align-items: center;
      border-bottom: 2px solid var(--primary);
    }

    .order-header-item {
      display: flex;
      flex-direction: column;
    }

    .order-header-item label {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 3px;
    }

    .order-header-item span {
      font-weight: 600;
      color: var(--text);
    }

    .order-id {
      font-size: 1.2rem;
      color: var(--primary);
      font-weight: 700;
    }

    .status-badge {
      padding: 5px 12px;
      border-radius: 15px;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .status-pago-pendiente {
      background: #FFF3E0;
      color: #FF6F00;
    }

    .status-pago-pagado {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .status-pedido-recibido {
      background: #E3F2FD;
      color: #1976D2;
    }

    .status-pedido-proceso {
      background: #FFF8E1;
      color: #FFA000;
    }

    .status-pedido-listo {
      background: #E8F5E9;
      color: #2E7D32;
    }

    .status-pedido-entregado {
      background: #ECEFF1;
      color: #607D8B;
    }

    .order-body {
      padding: 20px;
      display: none;
    }

    .order-body.expanded {
      display: block;
    }

    .products-list {
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid #eee;
    }

    .product-item {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
    }

    .product-item:last-child {
      border-bottom: none;
    }

    .order-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .detail-item label {
      font-size: 0.8rem;
      color: #666;
      margin-bottom: 3px;
    }

    .detail-item span {
      font-weight: 500;
    }

    /* Order Controls */
    .order-controls {
      background: var(--light);
      padding: 20px;
      border-radius: 8px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      align-items: end;
    }

    .control-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--primary);
    }

    .control-group select {
      width: 100%;
      padding: 10px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .control-group select:focus {
      outline: none;
      border-color: var(--primary);
    }

    .btn-save {
      background: var(--primary);
      color: var(--white);
      width: 100%;
    }

    .btn-whatsapp {
      background: #25D366;
      color: var(--white);
    }

    .btn-view-comprobante {
      background: var(--accent);
      color: var(--white);
    }

    .expand-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--primary);
      transition: transform 0.3s;
    }

    .expand-btn.rotated {
      transform: rotate(180deg);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state h3 {
      font-size: 1.5rem;
      margin-bottom: 10px;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .admin-container {
        flex-direction: column;
      }

      .filters-sidebar {
        width: 100%;
        height: auto;
        position: static;
        border-right: none;
        border-bottom: 1px solid #ddd;
      }

      .order-header {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 768px) {
      .admin-header {
        flex-direction: column;
        text-align: center;
      }

      .order-header {
        grid-template-columns: 1fr;
      }

      .order-controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="admin-header">
    <h1>🥟 Panel Delicias Torriet</h1>
    <div class="user-info">
      <span class="email" id="userEmail"></span>
      <a href="https://docs.google.com/spreadsheets/d/1u8R2W6YT6xlB0hWaytk-xARCOOCjg0M4lSqlRpGbSRc/edit" target="_blank" class="btn btn-secondary">Ver Sheet</a>
      <a href="https://deliciastorriet.github.io/Delicias-Torriet-Pagina-1/" target="_blank" class="btn btn-primary">Vista pública</a>
    </div>
  </header>

  <!-- Main Container -->
  <div class="admin-container">
    <!-- Filters Sidebar -->
    <aside class="filters-sidebar">
      <div class="filter-section">
        <h3>🔍 Buscar</h3>
        <div class="filter-group">
          <input type="text" id="searchInput" placeholder="Nombre, teléfono o ID pedido">
        </div>
      </div>

      <div class="filter-section">
        <h3>💰 Estado del Pago</h3>
        <div class="filter-group">
          <select id="filtroPago">
            <option value="todos">Todos</option>
            <option value="pendiente">Pendiente</option>
            <option value="pagado">Pagado</option>
          </select>
        </div>
      </div>

      <div class="filter-section">
        <h3>📦 Estado del Pedido</h3>
        <div class="filter-group">
          <select id="filtroPedido">
            <option value="todos">Todos</option>
            <option value="recibido">Recibido</option>
            <option value="en proceso">En proceso</option>
            <option value="listo">Listo</option>
            <option value="entregado">Entregado</option>
          </select>
        </div>
      </div>

      <div class="filter-section">
        <h3>📅 Ordenar por</h3>
        <div class="filter-group">
          <select id="orden">
            <option value="recientes">Más recientes</option>
            <option value="antiguos">Más antiguos</option>
            <option value="pendientes">Pendientes primero</option>
            <option value="listos">Listos primero</option>
          </select>
        </div>
      </div>

      <button class="btn btn-apply" onclick="aplicarFiltros()">Aplicar filtros</button>
      <button class="btn btn-secondary" onclick="cargarPedidos()" style="width: 100%; margin-top: 10px;">🔄 Recargar</button>
    </aside>

    <!-- Orders Main -->
    <main class="orders-main">
      <div class="orders-header">
        <h2>Pedidos</h2>
        <span class="orders-count" id="ordersCount">0 pedidos</span>
      </div>

      <div id="ordersList" class="orders-list">
        <div class="loading">Cargando pedidos...</div>
      </div>
    </main>
  </div>

  <script>
    let allPedidos = [];
    let filteredPedidos = [];

    // Load orders on page load
    window.onload = function() {
      cargarPedidos();
    };

    // Load orders from Apps Script
    function cargarPedidos() {
      document.getElementById('ordersList').innerHTML = '<div class="loading">Cargando pedidos...</div>';
      google.script.run
        .withSuccessHandler(renderPedidos)
        .withFailureHandler(handleError)
        .getPedidosAgrupados();
    }

    // Handle errors
    function handleError(error) {
      document.getElementById('ordersList').innerHTML = `
        <div class="empty-state">
          <h3>Error al cargar pedidos</h3>
          <p>${error.message || 'Error desconocido'}</p>
          <button class="btn btn-primary" onclick="cargarPedidos()" style="margin-top: 20px;">Reintentar</button>
        </div>
      `;
    }

    // Render orders
    function renderPedidos(pedidos) {
      allPedidos = pedidos;
      filteredPedidos = pedidos;
      document.getElementById('ordersCount').textContent = `${pedidos.length} pedidos`;
      renderFilteredPedidos();
    }

    // Render filtered orders
    function renderFilteredPedidos() {
      const container = document.getElementById('ordersList');

      if (filteredPedidos.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <h3>No hay pedidos</h3>
            <p>No se encontraron pedidos con los filtros actuales</p>
          </div>
        `;
        return;
      }

      container.innerHTML = filteredPedidos.map(pedido => `
        <div class="order-card" data-id="${pedido.idPedido}">
          <div class="order-header">
            <button class="expand-btn" onclick="toggleOrder('${pedido.idPedido}')">▼</button>
            <div class="order-header-item">
              <label>ID Pedido</label>
              <span class="order-id">${pedido.idPedido}</span>
            </div>
            <div class="order-header-item">
              <label>Fecha</label>
              <span>${formatDate(pedido.fecha)}</span>
            </div>
            <div class="order-header-item">
              <label>Cliente</label>
              <span>${pedido.nombre}</span>
            </div>
            <div class="order-header-item">
              <label>Teléfono</label>
              <span>${pedido.telefono}</span>
            </div>
            <div class="order-header-item">
              <label>Entrega</label>
              <span>${pedido.tipoEntrega}</span>
            </div>
            <div class="order-header-item">
              <label>Pago</label>
              <span class="status-badge status-pago-${pedido.estadoPago.toLowerCase().replace(' ', '-')}">${pedido.estadoPago}</span>
            </div>
            <div class="order-header-item">
              <label>Estado</label>
              <span class="status-badge status-pedido-${pedido.estadoPedido.toLowerCase().replace(' ', '-')}">${pedido.estadoPedido}</span>
            </div>
            <div class="order-header-item">
              <label>Total</label>
              <span>$${pedido.total.toFixed(2)}</span>
            </div>
          </div>
          <div class="order-body" id="body-${pedido.idPedido}">
            <div class="products-list">
              <h4>Productos</h4>
              ${pedido.productos.map(prod => `
                <div class="product-item">
                  <span>${prod.producto} x${prod.cantidad}</span>
                  <span>$${prod.subtotal.toFixed(2)}</span>
                </div>
              `).join('')}
            </div>

            <div class="order-details">
              <div class="detail-item">
                <label>Dirección</label>
                <span>${pedido.direccion || 'N/A'}</span>
              </div>
              <div class="detail-item">
                <label>Fecha entrega</label>
                <span>${pedido.fechaEntrega || 'N/A'}</span>
              </div>
              <div class="detail-item">
                <label>Notas</label>
                <span>${pedido.notas || 'N/A'}</span>
              </div>
              <div class="detail-item">
                <label>Comprobante</label>
                <span>${pedido.comprobante || 'N/A'}</span>
              </div>
            </div>

            <div class="order-controls">
              <div class="control-group">
                <label>Estado del Pago</label>
                <select id="pago-${pedido.idPedido}">
                  <option value="Pendiente" ${pedido.estadoPago === 'Pendiente' ? 'selected' : ''}>Pendiente</option>
                  <option value="Pagado" ${pedido.estadoPago === 'Pagado' ? 'selected' : ''}>Pagado</option>
                </select>
              </div>
              <div class="control-group">
                <label>Estado del Pedido</label>
                <select id="pedido-${pedido.idPedido}">
                  <option value="Recibido" ${pedido.estadoPedido === 'Recibido' ? 'selected' : ''}>Recibido</option>
                  <option value="En proceso" ${pedido.estadoPedido === 'En proceso' ? 'selected' : ''}>En proceso</option>
                  <option value="Listo" ${pedido.estadoPedido === 'Listo' ? 'selected' : ''}>Listo</option>
                  <option value="Entregado" ${pedido.estadoPedido === 'Entregado' ? 'selected' : ''}>Entregado</option>
                </select>
              </div>
              <button class="btn btn-whatsapp" onclick="contactarWhatsApp('${pedido.telefono}', '${pedido.idPedido}')">
                📱 WhatsApp
              </button>
              ${pedido.comprobante ? `
                <button class="btn btn-view-comprobante" onclick="verComprobante('${pedido.comprobante}')">
                  📄 Ver comprobante
                </button>
              ` : ''}
              <button class="btn btn-save" onclick="guardarCambios('${pedido.idPedido}')">
                💾 Guardar cambios
              </button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // Toggle order expansion
    function toggleOrder(id) {
      const body = document.getElementById(`body-${id}`);
      const btn = document.querySelector(`[data-id="${id}"] .expand-btn`);
      
      body.classList.toggle('expanded');
      btn.classList.toggle('rotated');
    }

    // Apply filters
    function aplicarFiltros() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const filtroPago = document.getElementById('filtroPago').value;
      const filtroPedido = document.getElementById('filtroPedido').value;
      const orden = document.getElementById('orden').value;

      filteredPedidos = allPedidos.filter(pedido => {
        // Search filter
        const matchSearch = !search || 
          pedido.nombre.toLowerCase().includes(search) ||
          pedido.telefono.includes(search) ||
          pedido.idPedido.toLowerCase().includes(search);

        // Payment filter
        const matchPago = filtroPago === 'todos' || 
          pedido.estadoPago.toLowerCase() === filtroPago;

        // Order status filter
        const matchPedido = filtroPedido === 'todos' || 
          pedido.estadoPedido.toLowerCase() === filtroPedido;

        return matchSearch && matchPago && matchPedido;
      });

      // Sort
      filteredPedidos.sort((a, b) => {
        switch (orden) {
          case 'recientes':
            return new Date(b.fecha) - new Date(a.fecha);
          case 'antiguos':
            return new Date(a.fecha) - new Date(b.fecha);
          case 'pendientes':
            return (a.estadoPago === 'Pendiente' ? -1 : 1) - (b.estadoPago === 'Pendiente' ? -1 : 1);
          case 'listos':
            return (a.estadoPedido === 'Listo' ? -1 : 1) - (b.estadoPedido === 'Listo' ? -1 : 1);
          default:
            return 0;
        }
      });

      document.getElementById('ordersCount').textContent = `${filteredPedidos.length} pedidos`;
      renderFilteredPedidos();
    }

    // Save changes
    function guardarCambios(idPedido) {
      const estadoPago = document.getElementById(`pago-${idPedido}`).value;
      const estadoPedido = document.getElementById(`pedido-${idPedido}`).value;

      google.script.run
        .withSuccessHandler(function() {
          alert('Cambios guardados exitosamente');
          cargarPedidos();
        })
        .withFailureHandler(function(error) {
          alert('Error al guardar: ' + error.message);
        })
        .actualizarEstado(idPedido, estadoPago, estadoPedido);
    }

    // Contact via WhatsApp
    function contactarWhatsApp(telefono, idPedido) {
      const mensaje = `Hola, tu pedido ${idPedido} de Delicias Torriet tiene una actualización.`;
      const url = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;
      window.open(url, '_blank');
    }

    // View receipt
    function verComprobante(comprobante) {
      alert(`Comprobante: ${comprobante}`);
    }

    // Format date
    function formatDate(dateString) {
      if (!dateString) return 'N/A';
      const date = new Date(dateString);
      return date.toLocaleDateString('es-PA', {
        year: 'numeric',
        month: 'short',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      });
    }
  </script>
</body>
</html>
